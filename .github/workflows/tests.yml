name: Tests

# Deterministic CI: lint + offline unit tests only. Nothing here touches the
# live CheapCharts API, so a red run always means a code problem, never an
# upstream outage. Live-API behavior is covered by canary.yml on a schedule.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check skills/cheapcharts/scripts tests .github/scripts

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the documented floor (README badge), 3.13 the current release
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: pip install pytest
      - name: Unit tests (offline, fixture-based)
        run: pytest tests

  windows-cp1252-smoke:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Exercise UTF-8 reconfigure from a cp1252 redirect
        shell: pwsh
        run: |
          $env:PYTHONIOENCODING = "cp1252"
          python skills/cheapcharts/scripts/deals.py --help > help.txt
          python tests/windows_cp1252_smoke.py > table.md
          if (-not (Select-String -Path table.md -SimpleMatch "âœ“" -Quiet)) {
            throw "fixture render did not preserve the UTF-8 ATL checkmark"
          }
